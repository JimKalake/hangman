<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TECH HANGMAN</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Bebas+Neue&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <div class="wrap">

        <!-- Header -->
        <div class="header">
            <div>
                <div class="logo">TECH<span>.</span>HANG</div>
                <div class="tagline">Guess the tech term — type the full word</div>
            </div>
            <div class="score-bar">
                <div class="score-chip"><b id="s-wins">0</b>Wins</div>
                <div class="score-chip"><b id="s-losses">0</b>Losses</div>
            </div>
        </div>

        <!-- Category + Lives -->
        <div class="top-row">
            <div class="cat-row">
                Category <div class="cat-badge" id="cat-label">—</div>
            </div>
            <div class="lives-row">
                Lives <div class="lives-pips" id="pips"></div>
            </div>
        </div>

        <!-- Hangman illustration -->
        <div class="scaffold-wrap">
            <svg id="gallows" viewBox="0 0 260 200" width="260" height="200" fill="none"
                xmlns="http://www.w3.org/2000/svg">
                <!-- Static scaffold -->
                <line x1="20" y1="192" x2="240" y2="192" stroke="#2a3550" stroke-width="3" stroke-linecap="round" />
                <line x1="65" y1="192" x2="65" y2="8" stroke="#2a3550" stroke-width="3" stroke-linecap="round" />
                <line x1="65" y1="8" x2="160" y2="8" stroke="#2a3550" stroke-width="3" stroke-linecap="round" />
                <line x1="160" y1="8" x2="160" y2="36" stroke="#2a3550" stroke-width="3" stroke-linecap="round" />
                <line x1="65" y1="30" x2="95" y2="8" stroke="#1e2535" stroke-width="2" stroke-linecap="round" />
                <!-- Body parts (revealed progressively via JS) -->
                <circle id="p-head" class="body-part" cx="160" cy="54" r="18" stroke="#ff3c5a" stroke-width="2.5" />
                <g id="p-face" class="body-part">
                    <circle cx="154" cy="51" r="2" fill="#ff3c5a" />
                    <circle cx="166" cy="51" r="2" fill="#ff3c5a" />
                    <path d="M154 60 Q160 56 166 60" stroke="#ff3c5a" stroke-width="1.8" stroke-linecap="round"
                        fill="none" />
                </g>
                <line id="p-body" class="body-part" x1="160" y1="72" x2="160" y2="122" stroke="#ff3c5a"
                    stroke-width="2.5" stroke-linecap="round" />
                <line id="p-larm" class="body-part" x1="160" y1="85" x2="136" y2="108" stroke="#ff3c5a"
                    stroke-width="2.5" stroke-linecap="round" />
                <line id="p-rarm" class="body-part" x1="160" y1="85" x2="184" y2="108" stroke="#ff3c5a"
                    stroke-width="2.5" stroke-linecap="round" />
                <line id="p-lleg" class="body-part" x1="160" y1="122" x2="138" y2="152" stroke="#ff3c5a"
                    stroke-width="2.5" stroke-linecap="round" />
                <line id="p-rleg" class="body-part" x1="160" y1="122" x2="182" y2="152" stroke="#ff3c5a"
                    stroke-width="2.5" stroke-linecap="round" />
                <!-- Death state: X eyes (shown on loss) -->
                <g id="p-dead" class="body-part">
                    <line x1="151" y1="48" x2="157" y2="54" stroke="#ff3c5a" stroke-width="2.2"
                        stroke-linecap="round" />
                    <line x1="157" y1="48" x2="151" y2="54" stroke="#ff3c5a" stroke-width="2.2"
                        stroke-linecap="round" />
                    <line x1="163" y1="48" x2="169" y2="54" stroke="#ff3c5a" stroke-width="2.2"
                        stroke-linecap="round" />
                    <line x1="169" y1="48" x2="163" y2="54" stroke="#ff3c5a" stroke-width="2.2"
                        stroke-linecap="round" />
                </g>
            </svg>
        </div>

        <!-- Clue -->
        <div class="clue-box" id="clue-box"><strong>CLUE</strong> —</div>

        <!-- Word display -->
        <div class="word-display" id="word-display"></div>

        <!-- Meta info -->
        <div class="meta-row">
            <div>Letters: <span id="meta-len">—</span></div>
            <div id="meta-words-wrap">Words: <span id="meta-words">—</span></div>
            <div>Guesses left: <span id="meta-rem">—</span></div>
        </div>

        <!-- Attempt log / tally -->
        <div class="tally-panel">
            <div class="tally-header">
                <div class="tally-title">▌ Attempt log</div>
                <div class="tally-count" id="tally-count">0 attempts</div>
            </div>
            <div class="tally-rows" id="tally-rows">
                <div class="tally-empty">No guesses yet — type your first attempt below</div>
            </div>
        </div>

        <!-- Input -->
        <div class="input-area">
            <input class="guess-input" id="guess-input" type="text" placeholder="Type your full guess and press Enter…"
                autocomplete="off" spellcheck="false" />
            <button class="submit-btn" id="submit-btn" onclick="submitGuess()">Guess →</button>
        </div>

        <!-- Win / loss status -->
        <div class="status-box" id="status-box"></div>

        <!-- Action buttons -->
        <div class="btn-row">
            <button class="hint-btn" id="hint-btn" onclick="useHint()">💡 Hint — reveal a letter (costs 1 life)</button>
            <button class="new-btn" onclick="newGame()">↺ New word</button>
        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
