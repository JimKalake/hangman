<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TECH HANGMAN</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Bebas+Neue&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #080b10;
            --panel: #0d1117;
            --panel2: #111620;
            --border: #1e2535;
            --border2: #2a3550;
            --text: #e8edf5;
            --muted: #4a5570;
            --muted2: #6a7590;
            --accent: #00d4ff;
            --accent2: #0099cc;
            --danger: #ff3c5a;
            --danger2: #7a1020;
            --success: #00ffaa;
            --warn: #ffd93d;
            --mono: 'JetBrains Mono', monospace;
            --display: 'Bebas Neue', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--mono);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem 3rem;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .wrap {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 620px;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            padding-bottom: .75rem;
            border-bottom: 1px solid var(--border2);
        }

        .logo {
            font-family: var(--display);
            font-size: 2.6rem;
            letter-spacing: .06em;
            color: var(--accent);
            line-height: 1;
        }

        .logo span {
            color: var(--text);
            opacity: .4;
        }

        .tagline {
            font-size: .6rem;
            letter-spacing: .2em;
            color: var(--muted2);
            text-transform: uppercase;
            padding-bottom: 4px;
        }

        .score-bar {
            display: flex;
            gap: 1rem;
        }

        .score-chip {
            background: var(--panel2);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: .3rem .75rem;
            font-size: .65rem;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--muted2);
        }

        .score-chip b {
            color: var(--accent);
            font-size: .9rem;
            display: block;
            font-weight: 800;
        }

        .top-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .cat-row {
            display: flex;
            align-items: center;
            gap: .5rem;
            font-size: .62rem;
            letter-spacing: .18em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .cat-badge {
            background: rgba(0, 212, 255, .08);
            border: 1px solid rgba(0, 212, 255, .2);
            color: var(--accent);
            padding: 3px 10px;
            border-radius: 3px;
            font-size: .62rem;
            letter-spacing: .15em;
        }

        .lives-row {
            display: flex;
            align-items: center;
            gap: .6rem;
            font-size: .62rem;
            letter-spacing: .15em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .lives-pips {
            display: flex;
            gap: 5px;
        }

        .pip {
            width: 22px;
            height: 8px;
            border-radius: 2px;
            background: var(--success);
            transition: all .3s;
        }

        .pip.lost {
            background: var(--danger);
            opacity: .5;
        }

        .scaffold-wrap {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scaffold-wrap svg {
            overflow: visible;
        }

        .body-part {
            transition: opacity .3s;
            opacity: 0;
        }

        .body-part.visible {
            opacity: 1;
        }

        .clue-box {
            background: var(--panel);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent2);
            border-radius: 4px;
            padding: .7rem 1rem;
            font-size: .78rem;
            color: var(--muted2);
            line-height: 1.5;
        }

        .clue-box strong {
            color: var(--warn);
        }

        .word-display {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.25rem 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 8px 4px;
            justify-content: center;
            min-height: 84px;
            align-items: center;
        }

        .letter-cell {
            width: 28px;
            height: 38px;
            border-bottom: 2px solid var(--border2);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 3px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: var(--display);
            letter-spacing: .05em;
            transition: all .25s;
        }

        .letter-cell.revealed {
            color: var(--success);
            border-color: var(--success);
        }

        .letter-cell.hinted {
            color: var(--warn);
            border-color: var(--warn);
        }

        .letter-cell.dead {
            color: var(--danger);
            border-color: var(--danger);
        }

        .word-gap {
            width: 16px;
        }

        .meta-row {
            display: flex;
            gap: 1.2rem;
            font-size: .62rem;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--muted);
            justify-content: center;
            flex-wrap: wrap;
        }

        .meta-row span {
            color: var(--muted2);
        }

        /* Tally */
        .tally-panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem 1.25rem;
        }

        .tally-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: .6rem;
        }

        .tally-title {
            font-size: .6rem;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .tally-count {
            font-size: .6rem;
            letter-spacing: .1em;
            color: var(--muted2);
        }

        .tally-rows {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 200px;
            overflow-y: auto;
        }

        .tally-rows::-webkit-scrollbar {
            width: 3px;
        }

        .tally-rows::-webkit-scrollbar-thumb {
            background: var(--border2);
            border-radius: 2px;
        }

        .tally-entry {
            display: grid;
            grid-template-columns: 24px 1fr auto 20px;
            align-items: center;
            gap: 10px;
            padding: 5px 10px;
            background: var(--panel2);
            border-radius: 4px;
            border: 1px solid var(--border);
            font-size: .72rem;
            animation: slideIn .2s ease;
        }

        .tally-num {
            color: var(--muted);
            font-size: .6rem;
            text-align: right;
        }

        .tally-word {
            letter-spacing: .1em;
            text-transform: uppercase;
            font-weight: 700;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .tally-word.correct-g {
            color: var(--success);
        }

        .tally-word.wrong-g {
            color: var(--danger);
            opacity: .7;
        }

        .tally-marks {
            font-family: monospace;
            font-size: .8rem;
            color: var(--muted2);
            letter-spacing: .06em;
            text-align: right;
        }

        .tally-icon {
            font-size: .85rem;
            text-align: center;
        }

        .tally-empty {
            font-size: .68rem;
            color: var(--muted);
            font-style: italic;
            padding: .5rem 0;
            text-align: center;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Input */
        .input-area {
            display: flex;
            gap: 8px;
        }

        .guess-input {
            flex: 1;
            background: var(--panel2);
            border: 1px solid var(--border2);
            border-radius: 6px;
            color: var(--text);
            font-family: var(--mono);
            font-size: .9rem;
            font-weight: 700;
            letter-spacing: .15em;
            padding: .65rem 1rem;
            text-transform: uppercase;
            outline: none;
            transition: border-color .15s, box-shadow .15s;
        }

        .guess-input::placeholder {
            color: var(--muted);
            font-weight: 400;
            letter-spacing: .05em;
            text-transform: none;
        }

        .guess-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(0, 212, 255, .12);
        }

        .guess-input:disabled {
            opacity: .3;
        }

        .guess-input.shake {
            animation: shake .35s ease;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-6px);
            }

            40% {
                transform: translateX(6px);
            }

            60% {
                transform: translateX(-4px);
            }

            80% {
                transform: translateX(4px);
            }
        }

        .submit-btn {
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 6px;
            font-family: var(--mono);
            font-size: .75rem;
            font-weight: 800;
            letter-spacing: .12em;
            text-transform: uppercase;
            padding: .65rem 1.25rem;
            cursor: pointer;
            transition: background .15s, transform .1s;
            white-space: nowrap;
        }

        .submit-btn:hover:not(:disabled) {
            background: #33ddff;
            transform: translateY(-1px);
        }

        .submit-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: .3;
            cursor: default;
        }

        .status-box {
            border-radius: 6px;
            padding: .7rem 1rem;
            font-size: .8rem;
            font-weight: 700;
            letter-spacing: .08em;
            text-align: center;
            display: none;
        }

        .status-box.visible {
            display: block;
        }

        .status-box.won {
            background: rgba(0, 255, 170, .08);
            border: 1px solid rgba(0, 255, 170, .3);
            color: var(--success);
        }

        .status-box.lost {
            background: rgba(255, 60, 90, .08);
            border: 1px solid rgba(255, 60, 90, .3);
            color: var(--danger);
        }

        .status-box small {
            display: block;
            font-size: .65rem;
            font-weight: 400;
            opacity: .8;
            margin-top: 3px;
            letter-spacing: .12em;
            text-transform: uppercase;
        }

        .btn-row {
            display: flex;
            gap: 8px;
        }

        .new-btn {
            flex: 1;
            background: transparent;
            border: 1px solid var(--border2);
            color: var(--muted2);
            font-family: var(--mono);
            font-size: .68rem;
            font-weight: 700;
            letter-spacing: .15em;
            text-transform: uppercase;
            padding: .6rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all .15s;
        }

        .new-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .hint-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            font-family: var(--mono);
            font-size: .68rem;
            font-weight: 700;
            letter-spacing: .15em;
            text-transform: uppercase;
            padding: .6rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all .15s;
            white-space: nowrap;
        }

        .hint-btn:hover:not(:disabled) {
            border-color: var(--warn);
            color: var(--warn);
        }

        .hint-btn:disabled {
            opacity: .25;
            cursor: default;
        }
    </style>
</head>

<body>
    <div class="wrap">

        <div class="header">
            <div>
                <div class="logo">TECH<span>.</span>HANG</div>
                <div class="tagline">Guess the tech term — type the full word</div>

        <div class="top-row">

                    <line x1="151" y1="48" x2="157" y2="54" stroke="#ff3c5a" stroke-width="2.2"

                    <line x1="157" y1="48" x2="151" y2="54" stroke="#ff3c5a" stroke-width="2.2"
                        stroke-linecap="round" />
                    <line x1="163" y1="48" x2="169" y2="54" stroke="#ff3c5a" stroke-width="2.2"
                        stroke-linecap="round" />
                    <line x1="169" y1="48" x2="163" y2="54" stroke="#ff3c5a" stroke-width="2.2"
                        stroke-linecap="round" />
                </g>
            </svg>
        </div>

        <div class="clue-box" id="clue-box"><strong>CLUE</strong> —</div>

        <div class="word-display" id="word-display"></div>

        <div class="meta-row">
            <div>Letters: <span id="meta-len">—</span></div>
            <div id="meta-words-wrap">Words: <span id="meta-words">—</span></div>
            <div>Guesses left: <span id="meta-rem">—</span></div>
        </div>

        <div class="tally-panel">
            <div class="tally-header">
                <div class="tally-title">▌ Attempt log</div>
                <div class="tally-count" id="tally-count">0 attempts</div>
            </div>
            <div class="tally-rows" id="tally-rows">
                <div class="tally-empty">No guesses yet — type your first attempt below</div>
            </div>
        </div>

        <div class="input-area">
            <input class="guess-input" id="guess-input" type="text" placeholder="Type your full guess and press Enter…"
                autocomplete="off" spellcheck="false" />
            <button class="submit-btn" id="submit-btn" onclick="submitGuess()">Guess →</button>
        </div>

        <div class="status-box" id="status-box"></div>

        <div class="btn-row">
            <button class="hint-btn" id="hint-btn" onclick="useHint()">💡 Hint — reveal a letter (costs 1 life)</button>
            <button class="new-btn" onclick="newGame()">↺ New word</button>
        </div>

    </div>
    <script>
        const WORDS = [

        const MAX_WRONG = 6;
        let word = "", clue = "", cat = "";
        let guesses = [], revealedPositions = new Set(), wrongCount = 0, gameOver = false, hintsLeft = 2;
        let wins = 0, losses = 0;

        function newGame() {
            const pick = WORDS[Math.floor(Math.random() * WORDS.length)];
            word = pick.w.toUpperCase(); clue = pick.clue; cat = pick.c;
            guesses = []; revealedPositions = new Set(); wrongCount = 0; gameOver = false; hintsLeft = 2;
            document.getElementById("cat-label").textContent = cat;
            document.getElementById("clue-box").innerHTML = `<strong>CLUE</strong> — ${clue}`;
            const wordParts = word.trim().split(" ");
            document.getElementById("meta-len").textContent = word.replace(/ /g, "").length;
            const mw = document.getElementById("meta-words-wrap");
            if (wordParts.length > 1) { mw.style.display = ""; document.getElementById("meta-words").textContent = wordParts.length; }
            else { mw.style.display = "none"; }
            document.getElementById("meta-rem").textContent = MAX_WRONG;
            document.getElementById("guess-input").value = "";
            document.getElementById("guess-input").disabled = false;
            document.getElementById("submit-btn").disabled = false;
            document.getElementById("hint-btn").disabled = false;
            document.getElementById("hint-btn").textContent = `💡 Hint — reveal a letter (${hintsLeft} left, costs 1 life)`;
            const sb = document.getElementById("status-box"); sb.className = "status-box"; sb.innerHTML = "";
            document.getElementById("tally-rows").innerHTML = '<div class="tally-empty">No guesses yet — type your first attempt below</div>';
            document.getElementById("tally-count").textContent = "0 attempts";
            renderWord(false, false); renderPips(); renderGallows(false);
        }

        function renderWord(won, dead) {
            const container = document.getElementById("word-display"); container.innerHTML = "";
            word.split("").forEach((ch, i) => {
                if (ch === " ") { const sp = document.createElement("div"); sp.className = "word-gap"; container.appendChild(sp); return; }
                const cell = document.createElement("div"); cell.className = "letter-cell";
                const isRevealed = revealedPositions.has(i);
                if (won || dead || isRevealed) {
                    cell.textContent = ch;
                    if (dead && !isRevealed) cell.classList.add("dead");
                    else if (revealedPositions.has(i) && !won) {
                        // check if it was from a hint
                        if (hintedPositions.has(i)) cell.classList.add("hinted");
                        else cell.classList.add("revealed");
                    }
                    else cell.classList.add("revealed");
                }
                container.appendChild(cell);
            });
        }

        const hintedPositions = new Set();

        function newGame_reset_hints() { hintedPositions.clear(); }

        // Override newGame to also clear hintedPositions
        const _origNew = newGame;
        window.newGame = function () { hintedPositions.clear(); _origNew(); };

        function addRevealedFromGuess(guess) {
            // Reveal letters that match position-for-position
            for (let i = 0; i < Math.min(guess.length, word.length); i++) {
                if (guess[i] === word[i]) revealedPositions.add(i);
            }
        }

        // Tally mark renderer (proper tally groups)
        function tallyMark(n) {
            if (n === 0) return "—";
            let s = "";
            const full = Math.floor(n / 5);
            const rem = n % 5;
            // Use pipe chars for tally
            for (let i = 0; i < full; i++) s += "||||̶ ";
            const singles = "|".repeat(rem);
            if (singles) s += singles;
            return s.trim();
        }

        function addTallyEntry(guess, isCorrect) {
            const rows = document.getElementById("tally-rows");
            rows.querySelectorAll(".tally-empty").forEach(e => e.remove());
            const n = guesses.length;
            const entry = document.createElement("div"); entry.className = "tally-entry";
            entry.innerHTML = `
    <span class="tally-num">${n}</span>
    <span class="tally-word ${isCorrect ? "correct-g" : "wrong-g"}">${guess}</span>
    <span class="tally-marks">${tallyMark(n)}</span>
    <span class="tally-icon">${isCorrect ? "✓" : "✗"}</span>
  `;
            rows.appendChild(entry); rows.scrollTop = rows.scrollHeight;
            document.getElementById("tally-count").textContent = `${n} attempt${n !== 1 ? "s" : ""}`;
        }

        function submitGuess() {
            if (gameOver) return;
            const input = document.getElementById("guess-input");
            const raw = input.value.trim().toUpperCase();
            if (!raw) { shakeInput(); return; }
            if (guesses.includes(raw)) { shakeInput(); input.value = ""; return; }
            guesses.push(raw);
            const correct = raw === word;
            addTallyEntry(raw, correct);
            input.value = "";
            if (correct) {
                // reveal all
                word.split("").forEach((_, i) => revealedPositions.add(i));
                renderWord(true, false);
                gameOver = true; wins++;
                document.getElementById("s-wins").textContent = wins;
                const sb = document.getElementById("status-box");
                sb.className = "status-box won visible";
                sb.innerHTML = `ACCESS GRANTED — Correct!<small>Solved in ${guesses.length} attempt${guesses.length !== 1 ? "s" : ""}</small>`;
                document.getElementById("guess-input").disabled = true;
                document.getElementById("submit-btn").disabled = true;
                document.getElementById("hint-btn").disabled = true;
            } else {
                wrongCount++;
                addRevealedFromGuess(raw);
                renderWord(false, false);
                renderPips();
                if (wrongCount >= MAX_WRONG) {
                    gameOver = true; losses++;
                    document.getElementById("s-losses").textContent = losses;
                    renderWord(false, true);
                    renderGallows(true);
                    const sb = document.getElementById("status-box");
                    sb.className = "status-box lost visible";
                    sb.innerHTML = `SYSTEM FAILURE — The answer was <strong>${word}</strong><small>Out of lives</small>`;
                    document.getElementById("guess-input").disabled = true;
                    document.getElementById("submit-btn").disabled = true;
                    document.getElementById("hint-btn").disabled = true;
                }
            }
        }

        function useHint() {
            if (gameOver || hintsLeft <= 0) return;
            const hidden = [];
            word.split("").forEach((ch, i) => { if (ch !== " " && !revealedPositions.has(i)) hidden.push(i); });
            if (!hidden.length) return;
            const pick = hidden[Math.floor(Math.random() * hidden.length)];
            revealedPositions.add(pick); hintedPositions.add(pick);
            wrongCount++; hintsLeft--;
            renderWord(false, false); renderPips();
            document.getElementById("hint-btn").textContent = `💡 Hint — reveal a letter (${hintsLeft} left, costs 1 life)`;
            if (hintsLeft <= 0) document.getElementById("hint-btn").disabled = true;
            if (wrongCount >= MAX_WRONG) {
                gameOver = true; losses++;
                document.getElementById("s-losses").textContent = losses;
                renderWord(false, true);
                renderGallows(true);
                const sb = document.getElementById("status-box");
                sb.className = "status-box lost visible";
                sb.innerHTML = `SYSTEM FAILURE — The answer was <strong>${word}</strong><small>Ran out of lives using hints</small>`;
                document.getElementById("guess-input").disabled = true;
                document.getElementById("submit-btn").disabled = true;
                document.getElementById("hint-btn").disabled = true;
            }
        }

        const PARTS = ["p-head", "p-face", "p-body", "p-larm", "p-rarm", "p-lleg", "p-rleg"];

        function renderGallows(dead) {
            PARTS.forEach((id, i) => {
                const el = document.getElementById(id);
                if (!el) return;
                if (id === "p-dead") {
                    el.classList.toggle("visible", dead === true);
                } else {
                    el.classList.toggle("visible", i < wrongCount);
                }
            });
            // hide smile on death, show X eyes
            const face = document.getElementById("p-face");
            const deadEl = document.getElementById("p-dead");
            if (dead) { face.classList.remove("visible"); deadEl.classList.add("visible"); }
        }

        function renderPips() {
            const pips = document.getElementById("pips"); pips.innerHTML = "";
            for (let i = 0; i < MAX_WRONG; i++) {
                const p = document.createElement("div"); p.className = "pip" + (i < wrongCount ? " lost" : ""); pips.appendChild(p);
            }
            document.getElementById("meta-rem").textContent = Math.max(0, MAX_WRONG - wrongCount);
            renderGallows(false);
        }

        function shakeInput() {
            const inp = document.getElementById("guess-input");
            inp.classList.remove("shake"); void inp.offsetWidth; inp.classList.add("shake");
            setTimeout(() => inp.classList.remove("shake"), 400);
        }

        document.getElementById("guess-input").addEventListener("keydown", e => { if (e.key === "Enter") submitGuess(); });

        newGame();
    </script>
</body>

</html>
